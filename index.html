<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Glow Background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Gradient -->
    <div class="bg-gradient"></div>

    <!-- Separate Decorative Elements -->
    <!-- Top Left Stripes -->
    <div class="stripe-container tl">
        <div class="stripe tl-1"></div>
        <div class="stripe tl-2"></div>
        <div class="stripe tl-3"></div>
    </div>

    <!-- Top Right Stripes -->
    <div class="stripe-container tr">
        <div class="stripe tr-1"></div>
        <div class="stripe tr-2"></div>
        <div class="stripe tr-3"></div>
        <div class="stripe tr-4"></div>
    </div>

    <!-- Stars Container (for JS) -->
    <div id="stars-container"></div>

    <!-- CRT Overlays -->
    <div class="crt-scanlines"></div>
    <div class="crt-vignette"></div>

    <script src="script.js"></script>
</body>
</html>
